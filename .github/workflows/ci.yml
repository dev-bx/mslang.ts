name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PHP-зеркало клонируем рядом, если задана переменная репо
      # и секрет с токеном (дефолтный GITHUB_TOKEN не имеет прав на чужой репо).
      # Без этого зеркальные/cross-runtime тесты автоматически пропускаются.
      - name: Чекаут PHP-зеркала
        if: vars.MSLANG_PHP_REPO != '' && secrets.MSLANG_PHP_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.MSLANG_PHP_REPO }}
          token: ${{ secrets.MSLANG_PHP_TOKEN }}
          path: ../devbx.core

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript типизация
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Старый набор (tests/tests.ts)
        run: npm test

      - name: Ловушки на баги (tests/bugs.ts)
        run: npm run test:bugs

      - name: Зеркало TS ↔ PHP (tests/mirror.ts)
        run: npm run test:mirror

      - name: Поведенческие cross-runtime (TS-сторона, tests/cross.ts)
        run: npm run test:cross

      - name: Сборка UMD + ESM
        run: npm run build
