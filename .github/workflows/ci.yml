name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript типизация
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Старый набор (tests/tests.ts)
        run: npm test

      - name: Ловушки на баги (tests/bugs.ts)
        run: npm run test:bugs

      - name: Зеркало TS ↔ PHP (tests/mirror.ts)
        run: npm run test:mirror

      - name: Поведенческие cross-runtime (TS-сторона)
        run: npm run test:cross

      - name: Сборка UMD
        run: npm run build

  php:
    name: PHP
    runs-on: ubuntu-latest
    # Зеркальный PHP-проект лежит в соседнем репозитории. Workflow клонирует
    # его рядом и запускает phpunit. Если хочешь — настрой переменную
    # MSLANG_PHP_REPO под свою орг/реп.
    env:
      MSLANG_PHP_REPO: ${{ vars.MSLANG_PHP_REPO || '' }}
    steps:
      - name: Чекаут текущего (TS)
        uses: actions/checkout@v4
        with:
          path: devbx.mslang

      - name: Чекаут PHP-зеркала
        if: env.MSLANG_PHP_REPO != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MSLANG_PHP_REPO }}
          path: devbx.core

      - name: Установка PHP
        if: env.MSLANG_PHP_REPO != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, xml, xmlwriter, mbstring
          coverage: none

      - name: Composer install
        if: env.MSLANG_PHP_REPO != ''
        working-directory: devbx.core
        run: composer install --prefer-dist --no-progress

      - name: PHPStan
        if: env.MSLANG_PHP_REPO != ''
        working-directory: devbx.core
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPUnit (полный набор)
        if: env.MSLANG_PHP_REPO != ''
        working-directory: devbx.core/tests
        run: ../vendor/bin/phpunit
