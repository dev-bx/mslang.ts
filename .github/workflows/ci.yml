name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript типизация (src + tests)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Старый набор (tests/tests.ts)
        run: npm test

      - name: Ловушки на баги (tests/bugs.ts)
        run: npm run test:bugs

      - name: Лимиты песочницы (tests/limits.ts)
        run: npm run test:limits

      # tests/mirror.ts сам пропускает свои 19 тестов, если PHP-зеркало
      # рядом не найдено (см. PHP_AVAILABLE в файле). Локально, где репо
      # devbx.core лежит рядом, тесты прогоняются. В CI они skipped.
      - name: Зеркало TS ↔ PHP (tests/mirror.ts)
        run: npm run test:mirror

      - name: Поведенческие cross-runtime (TS-сторона, tests/cross.ts)
        run: npm run test:cross

      - name: Сборка UMD + ESM
        run: npm run build
